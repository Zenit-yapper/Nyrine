<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    
    <!-- Blur Effect Gradient -->
    <linearGradient id="blurGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0" />
      <stop offset="30%" style="stop-color:#e94560;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#e94560;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560" />
      <stop offset="100%" style="stop-color:#533483" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow Filter -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Motion Blur Trail Lines -->
  <g opacity="0.6">
    <rect x="120" y="200" width="280" height="8" rx="4" fill="url(#blurGrad)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="140" y="240" width="240" height="8" rx="4" fill="url(#blurGrad)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="130" y="280" width="260" height="8" rx="4" fill="url(#blurGrad)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="160" y="320" width="200" height="8" rx="4" fill="url(#blurGrad)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Center Icon - Blurred Eye/Lens -->
  <circle cx="256" cy="256" r="60" fill="none" stroke="url(#accentGrad)" stroke-width="4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="45" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="256" cy="256" r="20" fill="url(#accentGrad)" filter="url(#glow)"/>
  
  <!-- Lens Flare -->
  <circle cx="280" cy="236" r="4" fill="#fff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="290" cy="226" r="2" fill="#fff" opacity="0.5"/>
  
  <!-- "Nyrine" Text -->
  <text x="256" y="420" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle" filter="url(#shadow)" letter-spacing="4">
    NYRINE
  </text>
  
  <!-- "Blur" Text -->
  <text x="256" y="460" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="url(#accentGrad)" text-anchor="middle" letter-spacing="8" opacity="0.8">
    BLUR
  </text>
  
  <!-- Decorative Lines -->
  <line x1="180" y1="380" x2="332" y2="380" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3"/>
</svg>